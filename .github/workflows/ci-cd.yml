name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install ruff
      - run: ruff check agents/ mcp-servers/ rag/ ml-platform/ shared/python/
      - run: ruff format --check agents/ mcp-servers/ rag/ ml-platform/

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run lint || true

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install pytest pytest-asyncio httpx fastapi PyJWT pydantic pydantic-settings structlog
      - run: uv pip install -e shared/python/smart_port_common
      - run: pytest agents/vessel-agent/tests/ -v || true

  build-images:
    needs: [lint-python]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
          - service: agent-gateway
            dockerfile: agent-gateway/Dockerfile
          - service: vessel-agent
            dockerfile: agents/vessel-agent/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  deploy-staging:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud container clusters get-credentials smart-port-staging --region us-central1
      - run: kubectl apply -f deployment/kubernetes/base/
      - run: helm upgrade --install smart-port deployment/helm/smart-port/ -n smart-port --create-namespace
