name: Docker

on:
  push:
    branches: [main, ai-distributor-ordering-platform]
    paths:
      - "infrastructure/docker/**"
      - "ai-platform/**"
      - "shared/**"
      - "gateway/**"
      - "frontend/**"
      - "services/**"
      - "pyproject.toml"
      - "docker-compose*.yml"
  pull_request:
    branches: [main, ai-distributor-ordering-platform]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/greecyinfotech/agenticai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: ai-platform
            dockerfile: infrastructure/docker/Dockerfile.ai-platform
            context: .
          - name: gateway
            dockerfile: infrastructure/docker/Dockerfile.gateway
            context: .
          - name: frontend
            dockerfile: infrastructure/docker/Dockerfile.frontend
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/ai-distributor-ordering-platform'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/ai-distributor-ordering-platform' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:0.1.0
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-microservices:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - order-service
          - inventory-service
          - customer-service
          - pricing-service
          - payment-service
          - shipment-service
          - promotion-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Build microservice image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.service \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t ${{ env.IMAGE_PREFIX }}/microservice-${{ matrix.service }}:0.1.0 \
            .

      - name: Push microservice image
        if: github.event_name == 'push' && github.ref == 'refs/heads/ai-distributor-ordering-platform'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_PREFIX }}/microservice-${{ matrix.service }}:0.1.0
