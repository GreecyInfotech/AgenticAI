name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '21'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build platform JARs
        run: mvn -B clean package -DskipTests

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bfsi-platform-jars
          retention-days: 30
          path: |
            api-gateway/target/*.jar
            agent-platform/orchestrator/target/*.jar
            ai-gateway/model-router/target/*.jar
            rag/rag-api/target/*.jar
            search/search-api/target/*.jar
            tools/tools-api/target/*.jar
            messaging/messaging-api/target/*.jar
            bff/*/target/*.jar
            agents/*/target/*.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            api-gateway/target/api-gateway-*.jar
            agent-platform/orchestrator/target/orchestrator-*.jar
