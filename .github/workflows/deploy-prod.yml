name: Deploy Prod

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  HELM_RELEASE: distributor-platform
  HELM_NAMESPACE: distributor
  IMAGE_TAG: 0.1.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm chart
        run: |
          helm upgrade --install "${{ env.HELM_RELEASE }}" infrastructure/helm/distributor-platform \
            -f infrastructure/helm/distributor-platform/values.yaml \
            -f infrastructure/helm/distributor-platform/values-prod.yaml \
            --namespace "${{ env.HELM_NAMESPACE }}" \
            --create-namespace \
            --set global.imageRegistry="${{ secrets.ACR_LOGIN_SERVER }}" \
            --set aiPlatform.image.tag="${{ env.IMAGE_TAG }}" \
            --set gateway.image.tag="${{ env.IMAGE_TAG }}" \
            --set frontend.image.tag="${{ env.IMAGE_TAG }}" \
            --set microserviceDefaults.image.tag="${{ env.IMAGE_TAG }}" \
            --set externalServices.postgres.host="${{ secrets.POSTGRES_HOST }}" \
            --set externalServices.redis.host="${{ secrets.REDIS_HOST }}" \
            --set externalServices.kafka.bootstrapServers="${{ secrets.KAFKA_BOOTSTRAP }}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-ai-platform -n ${{ env.HELM_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-gateway -n ${{ env.HELM_NAMESPACE }} --timeout=300s
