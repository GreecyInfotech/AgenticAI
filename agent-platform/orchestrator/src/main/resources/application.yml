server:
  port: 8200
spring:
  application:
    name: orchestrator
agents:
  host: localhost
rag:
  enabled: true
  url: ${RAG_URL:http://localhost:8350}
messaging:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: orchestrator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
