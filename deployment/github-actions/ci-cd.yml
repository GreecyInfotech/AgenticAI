name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/r/setup-uv@v4
      - run: uv pip install ruff mypy
      - run: ruff check agents/ mcp-servers/ rag/ ml-platform/ shared/python/
      - run: ruff format --check agents/ mcp-servers/ rag/ ml-platform/

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run lint

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/r/setup-uv@v4
      - run: uv pip install pytest pytest-asyncio httpx
      - run: uv pip install -e shared/python/smart_port_common
      - run: pytest agents/vessel-agent/tests/ -v

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run test

  build-and-push:
    needs: [lint-python, lint-typescript, test-python]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - agent-gateway
          - vessel-agent
          - container-agent
          - customs-agent
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service == 'api-gateway' || matrix.service == 'agent-gateway' && format('{0}/Dockerfile', matrix.service) || format('agents/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud container clusters get-credentials smart-port-staging --region us-central1
      - run: kubectl apply -f deployment/kubernetes/base/
      - run: helm upgrade --install smart-port deployment/helm/smart-port/ -n smart-port
