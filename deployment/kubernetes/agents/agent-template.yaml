apiVersion: apps/v1
kind: Deployment
metadata:
  name: AGENT_NAME
  namespace: smart-port
  labels:
    app: AGENT_NAME
    component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: AGENT_NAME
  template:
    metadata:
      labels:
        app: AGENT_NAME
        component: agent
    spec:
      containers:
        - name: AGENT_NAME
          image: smart-port/AGENT_NAME:latest
          ports:
            - containerPort: AGENT_PORT
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: AGENT_PORT
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: AGENT_PORT

---
apiVersion: v1
kind: Service
metadata:
  name: AGENT_NAME
  namespace: smart-port
spec:
  selector:
    app: AGENT_NAME
  ports:
    - port: AGENT_PORT
      targetPort: AGENT_PORT
