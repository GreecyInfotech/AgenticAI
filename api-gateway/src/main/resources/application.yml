server:
  port: 8000
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, bfsi-api-gateway
      routes:
        - id: customer-bff
          uri: http://localhost:8101
          predicates:
            - Path=/api/customer/**
          filters:
            - RewritePath=/api/customer/(?<segment>.*), /api/${segment}
        - id: employee-bff
          uri: http://localhost:8102
          predicates:
            - Path=/api/employee/**
          filters:
            - RewritePath=/api/employee/(?<segment>.*), /api/${segment}
        - id: admin-bff
          uri: http://localhost:8103
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/admin/(?<segment>.*), /api/${segment}
        - id: orchestrator-direct
          uri: http://localhost:8200
          predicates:
            - Path=/api/orchestrate/**
          filters:
            - RewritePath=/api/orchestrate/(?<segment>.*), /api/v1/orchestrate/${segment}
        - id: agent-registry-direct
          uri: http://localhost:8201
          predicates:
            - Path=/api/registry/**
          filters:
            - RewritePath=/api/registry/(?<segment>.*), /api/v1/registry/${segment}
        - id: ai-gateway
          uri: http://localhost:8300
          predicates:
            - Path=/api/ai/**
          filters:
            - RewritePath=/api/ai/(?<segment>.*), /api/v1/${segment}
        - id: rag-service
          uri: http://localhost:8350
          predicates:
            - Path=/api/rag/**
          filters:
            - RewritePath=/api/rag/(?<segment>.*), /api/v1/${segment}
        - id: tools-api
          uri: http://localhost:8450
          predicates:
            - Path=/api/tools/**
          filters:
            - RewritePath=/api/tools/(?<segment>.*), /api/v1/${segment}
        - id: search-api
          uri: http://localhost:8370
          predicates:
            - Path=/api/search/**
          filters:
            - RewritePath=/api/search/(?<segment>.*), /api/v1/${segment}
        - id: messaging-api
          uri: http://localhost:8550
          predicates:
            - Path=/api/messaging/**
          filters:
            - RewritePath=/api/messaging/(?<segment>.*), /api/v1/${segment}
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
