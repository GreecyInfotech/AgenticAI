groups:
  - name: smart-port-alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: HighAgentLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"

      - alert: YardUtilizationHigh
        expr: yard_utilization_ratio > 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container yard utilization above 95%"
