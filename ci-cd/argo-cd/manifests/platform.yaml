apiVersion: v1
kind: Namespace
metadata:
  name: bfsi-platform
  labels:
    app.kubernetes.io/part-of: bfsi-agentic-ai-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: bfsi-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: bfsi/api-gateway:0.1.0-SNAPSHOT
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 40
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: bfsi-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: bfsi-platform
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: bfsi/orchestrator:0.1.0-SNAPSHOT
          ports:
            - containerPort: 8200
          env:
            - name: KAFKA_ENABLED
              value: "true"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          readinessProbe:
            httpGet:
              path: /api/v1/orchestrate/health
              port: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: bfsi-platform
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8200
      targetPort: 8200
