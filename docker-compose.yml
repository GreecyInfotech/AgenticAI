version: "3.9"

x-python-service: &python-service
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
    kafka:
      condition: service_started
  networks:
    - smart-port

services:
  # ── Data Platform ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: smartport
      POSTGRES_PASSWORD: smartport
      POSTGRES_DB: smartport
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-platform/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartport"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [smart-port]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [smart-port]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    networks: [smart-port]

  # ── Event Platform ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [smart-port]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [smart-port]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on: [kafka]
    ports: ["8082:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    networks: [smart-port]

  # ── Observability ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [smart-port]

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks: [smart-port]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    ports: ["4317:4317", "4318:4318"]
    volumes:
      - ./observability/opentelemetry/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    networks: [smart-port]

  # ── Gateways ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports: ["8080:8080"]
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
    depends_on: [postgres, redis, kafka]
    networks: [smart-port]

  agent-gateway:
    build:
      context: .
      dockerfile: agent-gateway/Dockerfile
    ports: ["8081:8081"]
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      - vessel-agent
      - container-agent
    networks: [smart-port]

  # ── AI Agents ────────────────────────────────────────────────
  vessel-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/vessel-agent/Dockerfile }
    ports: ["8100:8100"]

  container-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/container-agent/Dockerfile }
    ports: ["8101:8101"]

  customs-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/customs-agent/Dockerfile }
    ports: ["8102:8102"]

  billing-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/billing-agent/Dockerfile }
    ports: ["8103:8103"]

  maintenance-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/maintenance-agent/Dockerfile }
    ports: ["8104:8104"]

  incident-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/incident-agent/Dockerfile }
    ports: ["8105:8105"]

  planning-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/planning-agent/Dockerfile }
    ports: ["8106:8106"]

  safety-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/safety-agent/Dockerfile }
    ports: ["8107:8107"]

  weather-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/weather-agent/Dockerfile }
    ports: ["8108:8108"]

  logistics-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/logistics-agent/Dockerfile }
    ports: ["8109:8109"]

  executive-agent:
    <<: *python-service
    build: { context: ., dockerfile: agents/executive-agent/Dockerfile }
    ports: ["8110:8110"]

  # ── RAG Services ─────────────────────────────────────────────
  vector-search:
    <<: *python-service
    build: { context: ., dockerfile: rag/vector-search/Dockerfile }
    ports: ["8203:8203"]

  embedding-service:
    <<: *python-service
    build: { context: ., dockerfile: rag/embedding-service/Dockerfile }
    ports: ["8202:8202"]

  # ── ML Services ──────────────────────────────────────────────
  vessel-delay-prediction:
    <<: *python-service
    build: { context: ., dockerfile: ml-platform/vessel-delay-prediction/Dockerfile }
    ports: ["8300:8300"]

  congestion-prediction:
    <<: *python-service
    build: { context: ., dockerfile: ml-platform/congestion-prediction/Dockerfile }
    ports: ["8304:8304"]

  # ── Frontends ────────────────────────────────────────────────
  port-operations-ui:
    build: { context: ., dockerfile: frontend/port-operations-ui/Dockerfile }
    ports: ["5173:80"]
    depends_on: [api-gateway]
    networks: [smart-port]

  executive-dashboard:
    build: { context: ., dockerfile: frontend/executive-dashboard/Dockerfile }
    ports: ["5174:80"]
    depends_on: [api-gateway]
    networks: [smart-port]

  customs-dashboard:
    build: { context: ., dockerfile: frontend/customs-dashboard/Dockerfile }
    ports: ["5175:80"]
    depends_on: [api-gateway]
    networks: [smart-port]

volumes:
  postgres_data:
  grafana_data:

networks:
  smart-port:
    driver: bridge
