version: "3.9"

x-service-build: &service-build
  context: .
  dockerfile: infrastructure/docker/Dockerfile.service

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-distributor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-distributor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-distributor_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distributor -d distributor_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  ai-platform:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.ai-platform
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      AI_PLATFORM_URL: http://ai-platform:8000
      ORDER_SERVICE_URL: http://order-service:8080
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      CUSTOMER_SERVICE_URL: http://customer-service:8080
    depends_on:
      - ai-platform
      - order-service
      - inventory-service
      - customer-service

  order-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/order-service
    ports:
      - "8001:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  inventory-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/inventory-service
    ports:
      - "8002:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  customer-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/customer-service
    ports:
      - "8003:8080"
    env_file:
      - .env

  pricing-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/pricing-service
    ports:
      - "8004:8080"
    env_file:
      - .env

  payment-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/payment-service
    ports:
      - "8005:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  shipment-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/shipment-service
    ports:
      - "8006:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  promotion-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/promotion-service
    ports:
      - "8007:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/notification-service
    ports:
      - "8008:8080"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  analytics-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/analytics-service
    ports:
      - "8009:8080"
    env_file:
      - .env

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway
      - ai-platform

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
