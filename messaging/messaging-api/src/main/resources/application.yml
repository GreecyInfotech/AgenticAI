server:
  port: ${MESSAGING_PORT:8550}
  shutdown: graceful

spring:
  application:
    name: messaging-api

messaging:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    client-id: messaging-api
    consumer-group: bfsi-messaging-consumers

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

logging:
  level:
    com.bfsi.platform.messaging: INFO
