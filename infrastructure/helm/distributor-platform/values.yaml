global:
  imageRegistry: ghcr.io/greecyinfotech
  imagePullSecrets: []
  environment: production

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: distributor.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
  tls:
    - secretName: distributor-tls
      hosts:
        - distributor.example.com

aiPlatform:
  enabled: true
  replicaCount: 2
  image:
    repository: agenticai/ai-platform
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    APP_ENV: production
    LOG_LEVEL: INFO
    LLM_PROVIDER: openai
    KAFKA_ENABLED: "true"
    OTEL_ENABLED: "true"

gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: agenticai/gateway
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: agenticai/frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

microservices:
  - name: order-service
    port: 8080
    replicas: 2
    kafka: true
  - name: inventory-service
    port: 8080
    replicas: 2
    kafka: true
  - name: customer-service
    port: 8080
    replicas: 2
    kafka: false
  - name: pricing-service
    port: 8080
    replicas: 1
    kafka: false
  - name: payment-service
    port: 8080
    replicas: 2
    kafka: true
  - name: shipment-service
    port: 8080
    replicas: 2
    kafka: true
  - name: promotion-service
    port: 8080
    replicas: 1
    kafka: true
  - name: notification-service
    port: 8080
    replicas: 2
    kafka: true
  - name: analytics-service
    port: 8080
    replicas: 1
    kafka: false

microserviceDefaults:
  image:
    repository: agenticai/microservice
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# External managed services (from Terraform outputs)
externalServices:
  postgres:
    host: ""
    port: 5432
    database: distributor_platform
    user: distributor
    existingSecret: distributor-platform-secrets
    passwordKey: postgres-password
  redis:
    host: ""
    port: 6379
    existingSecret: distributor-platform-secrets
    passwordKey: redis-password
  qdrant:
    host: ""  # set to in-cluster service when qdrant.enabled=true
    port: 6333
    collection: distributor_knowledge
  kafka:
    bootstrapServers: ""
    existingSecret: distributor-platform-secrets
    passwordKey: kafka-password

qdrant:
  enabled: false
  replicaCount: 1
  image:
    repository: qdrant/qdrant
    tag: "v1.12.5"
    pullPolicy: IfNotPresent
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

secrets:
  create: true
  jwtSecret: ""  # set via --set or external secret manager
  openaiApiKey: ""

monitoring:
  prometheus:
    enabled: true
    scrapeInterval: 15s
  grafana:
    enabled: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
