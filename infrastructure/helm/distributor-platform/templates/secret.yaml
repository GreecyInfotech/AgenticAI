{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "distributor-platform.fullname" . }}-secrets
  labels:
    {{- include "distributor-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 64) | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  postgres-password: {{ .Values.externalServices.postgres.password | default "changeme" | quote }}
  redis-password: {{ .Values.externalServices.redis.password | default "" | quote }}
{{- end }}
