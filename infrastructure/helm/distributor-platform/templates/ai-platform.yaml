{{- if .Values.aiPlatform.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distributor-platform.fullname" . }}-ai-platform
  labels:
    {{- include "distributor-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-platform
spec:
  replicas: {{ .Values.aiPlatform.replicaCount }}
  selector:
    matchLabels:
      {{- include "distributor-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-platform
  template:
    metadata:
      labels:
        {{- include "distributor-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-platform
    spec:
      serviceAccountName: {{ include "distributor-platform.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ai-platform
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.aiPlatform.image.repository }}:{{ .Values.aiPlatform.image.tag }}"
          imagePullPolicy: {{ .Values.aiPlatform.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "distributor-platform.fullname" . }}-config
          env:
            {{- range $key, $value := .Values.aiPlatform.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.postgres.existingSecret | default (printf "%s-secrets" (include "distributor-platform.fullname" .)) }}
                  key: {{ .Values.externalServices.postgres.passwordKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.postgres.existingSecret | default (printf "%s-secrets" (include "distributor-platform.fullname" .)) }}
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.postgres.existingSecret | default (printf "%s-secrets" (include "distributor-platform.fullname" .)) }}
                  key: openai-api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.aiPlatform.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "distributor-platform.fullname" . }}-ai-platform
  labels:
    {{- include "distributor-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-platform
spec:
  type: {{ .Values.aiPlatform.service.type }}
  ports:
    - port: {{ .Values.aiPlatform.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "distributor-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai-platform
{{- end }}
