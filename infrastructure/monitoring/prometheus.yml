global:
  scrape_interval: 15s

scrape_configs:
  - job_name: ai-platform
    static_configs:
      - targets: ["ai-platform:8000"]
    metrics_path: /api/v1/metrics

  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]
    metrics_path: /metrics

  - job_name: microservices
    static_configs:
      - targets:
          - order-service:8080
          - inventory-service:8080
          - customer-service:8080
          - payment-service:8080
    metrics_path: /metrics
